version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: tradeflow-postgres
    environment:
      POSTGRES_USER: tradeflow
      POSTGRES_PASSWORD: tradeflow
      POSTGRES_DB: tradeflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tradeflow-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
